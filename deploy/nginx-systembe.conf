# Nginx server block para SystemBe
# Copiar a: /etc/nginx/sites-available/systembe.tech
# Activar:  sudo ln -s /etc/nginx/sites-available/systembe.tech /etc/nginx/sites-enabled/
# Probar:   sudo nginx -t
# Aplicar:  sudo systemctl reload nginx
#
# Sirve el dominio systembe.tech desde la subcarpeta, sin afectar otros sitios.

server {
    listen 80;
    listen [::]:80;

    server_name systembe.tech www.systembe.tech;

    root /var/www/html/systembe;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache de assets estáticos
    location ~* \.(css|js|png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Página de error 404 amigable (opcional)
    error_page 404 /index.html;
}

# --- HTTPS ---
# Después de que el sitio cargue por HTTP, obtén certificado gratis con:
#   sudo certbot --nginx -d systembe.tech -d www.systembe.tech
# Certbot agrega automáticamente el bloque listen 443 con SSL.
