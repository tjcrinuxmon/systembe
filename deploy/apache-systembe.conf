# Apache VirtualHost para SystemBe
# Copiar a: /etc/apache2/sites-available/systembe.tech.conf
# Activar:  sudo a2ensite systembe.tech.conf
# Probar:   sudo apache2ctl configtest
# Aplicar:  sudo systemctl reload apache2
#
# Sirve el dominio systembe.tech desde la subcarpeta, sin afectar otros sitios.

<VirtualHost *:80>
    ServerName systembe.tech
    ServerAlias www.systembe.tech

    DocumentRoot /var/www/html/systembe
    DirectoryIndex index.html

    <Directory /var/www/html/systembe>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Seguridad: no exponer .git, scripts ni archivos internos si se clona el repo aquí
    <DirectoryMatch "\.git">
        Require all denied
    </DirectoryMatch>
    <FilesMatch "(^\.|\.(sh|md)$)">
        Require all denied
    </FilesMatch>
    <Directory /var/www/html/systembe/deploy>
        Require all denied
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/systembe_error.log
    CustomLog ${APACHE_LOG_DIR}/systembe_access.log combined
</VirtualHost>

# --- HTTPS ---
# Después de que el sitio cargue por HTTP, obtén certificado gratis con:
#   sudo certbot --apache -d systembe.tech -d www.systembe.tech
